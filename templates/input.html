<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Image</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <a href="{{ url_for('index') }}" class="back-link">&larr; Back to Home</a>
        
        <div class="upload-form-container">
            <h1>Upload an Image</h1>
            <p>Accepted formats: JPG, PNG</p>
            
            <form action="{{ url_for('process_image') }}" method="post" enctype="multipart/form-data">
                <input type="file" name="file" id="file-upload" class="file-input-hidden" accept=".jpg, .jpeg, .png" required>
                <label for="file-upload" class="file-input-label">
                    <span>Choose File</span>
                </label>
                <span id="file-name" class="file-name-display">No file chosen</span>
                
                <button type="submit" class="btn btn-full-width">Enhance & Process Text</button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('file-upload').addEventListener('change', function() {
            var fileName = this.files[0] ? this.files[0].name : 'No file chosen';
            document.getElementById('file-name').textContent = fileName;
        });
    </script>
</body>
</html>
